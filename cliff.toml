# git-cliff configuration — generates release notes and CHANGELOG.md from
# Conventional Commit messages. See https://git-cliff.org
#
# This repo lands changes via local --no-ff merges (no GitHub PRs), so notes are
# derived from commit *messages*, not PRs. Keep commit subjects conventional
# (feat:/fix:/docs:/ci:/chore:/data: ...) and they slot into the right section.

[changelog]
header = """
# Changelog

All notable changes to this project are documented here.
Generated by [git-cliff](https://git-cliff.org) from Conventional Commit messages.

"""
# Rendered once per release section. `commit.message` is the description with the
# `type:` prefix already stripped (conventional parsing is on below).
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d", timezone="Asia/Taipei") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }})
{% endfor %}\
{% endfor %}\n
"""
trim = true
footer = ""

[git]
# Parse Conventional Commits; drop anything that isn't one (merge commits, etc.).
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = false
filter_commits = false
topo_order = false
sort_commits = "oldest"
# Only consider vX.Y.Z tags as releases.
tag_pattern = "v[0-9]*"

# Map each commit type to a section. `default_scope`/order follows this list.
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^data", group = "Data" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Testing" },
  { message = "^ci", group = "CI/CD" },
  { message = "^build", group = "Build" },
  { message = "^chore", group = "Chores" },
  { message = "^style", group = "Styling" },
  { message = "^revert", group = "Reverts" },
  # Anything else conventional but unmapped still shows, under "Other".
  { message = ".*", group = "Other" },
]
